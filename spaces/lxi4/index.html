<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>li2x</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:black;
}

/* 🎥 فيديو */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.35);
}

/* 🎬 دخول */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  cursor:pointer;
}

.overlay h1{
  font-size:26px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:0.5;}
}

/* 🧑 صورة */
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid white;
  margin-bottom:15px;
}

/* ✨ اسم (Glow ناعم) */
.name{
  font-size:34px;
  font-weight:bold;
  text-shadow:0 0 6px rgba(255,255,255,0.5);
}

/* 🧠 وصف */
.bio{
  margin:10px 0;
  color:#ccc;
}

/* 🔥 أيقونات مثل الصورة */
.icons{
  margin:12px 0;
  font-size:20px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.icons img{
  width:22px;
  height:22px;
  filter:grayscale(1);
  transition:0.3s;
}

.icons img:hover{
  filter:grayscale(0);
  transform:scale(1.2);
}

/* 🎧 Discord أيقونة */
.discord{
  margin-top:12px;
}

.discord img{
  width:28px;
  cursor:pointer;
  transition:0.3s;
}

.discord img:hover{
  transform:scale(1.2);
}

/* 👁️ المشاهدات */
.views{
  position:absolute;
  bottom:20px;
  left:20px;
  display:flex;
  align-items:center;
  gap:6px;
  color:#ccc;
  font-size:14px;
}

.eye{
  width:18px;
  opacity:0.7;
}

</style>
</head>

<body>

<!-- شاشة الدخول -->
<div class="overlay" onclick="startSite()">
  <h1>Click to Enter</h1>
</div>

<!-- الفيديو -->
<video id="bgVideo" loop>
  <source src="https://files.catbox.moe/jm9c1p.mp4" type="video/mp4">
</video>

<!-- الصوت -->
<audio id="bgMusic">
  <source src="https://files.catbox.moe/r9ig2d.mp3" type="audio/mpeg">
</audio>

<div style="text-align:center;">

  <!-- صورتك -->
  <img src="https://cdn.discordapp.com/attachments/1048907974728486953/1365089054269374636/black_and_white.gif?ex=6a0ce140&is=6a0b8fc0&hm=c6d2abbcc54c0f5ea4ad21d5d67479d9e0bc260b104f7c40572fb228b0a61086&" class="avatar">

  <div class="name">Moj</div>

  <!-- أيقونات نفس الشكل -->
  <div class="icons">
    <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
    <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">
  </div>

  <div class="bio">
    あの世で会えるといいな
  </div>

  <!-- Discord أيقونة -->
  <div class="discord">
    <a href="https://discord.com/users/z65_" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
    </a>
  </div>

</div>

<!-- 👁️ المشاهدات -->
<div class="views">
  <img class="eye" src="https://cdn-icons-png.flaticon.com/512/159/159604.png">
  1k
</div>

<script>
function startSite(){
  document.querySelector(".overlay").style.display="none";

  const video = document.getElementById("bgVideo");
  const music = document.getElementById("bgMusic");

  video.play();
  music.volume = 0.7;
  music.play();
}
</script>

</body>
</html>
