<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>li2x</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:black;
}

/* 🎥 فيديو الخلفية */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.4);
}

/* 🎬 شاشة الدخول */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  cursor:pointer;
}

.overlay h1{
  font-size:30px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:0.5;}
}

/* 🧊 الكرت */
.card{
  text-align:center;
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

/* 🧑 صورة */
.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-bottom:15px;
  border:3px solid #00ffff;
}

/* ✨ الاسم */
.name{
  font-size:28px;
  background:linear-gradient(90deg,#00ffff,#00ff99);
  -webkit-background-clip:text;
  color:transparent;
}

.box{
  margin-top:15px;
  padding:10px;
  border-radius:15px;
  background:rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<!-- 🎬 شاشة دخول -->
<div class="overlay" onclick="startSite()">
  <h1>Click to Enter</h1>
</div>

<!-- 🎥 الفيديو -->
<video id="bgVideo" loop>
  <source src="https://r2.guns.lol/687f862d-49bd-48dc-9cc0-e7713908a0a6.mp4" type="video/mp4">
</video>

<!-- 🧊 المحتوى -->
<div class="card">
  <img src="https://i.pravatar.cc/150" class="avatar">

  <div class="name">li2x</div>

  <div class="box">
    🎧 Discord: <b>z65_</b>
  </div>
</div>

<script>
function startSite(){
  document.querySelector(".overlay").style.display = "none";

  const video = document.getElementById("bgVideo");

  video.muted = false;
  video.volume = 1;
  video.play();
}
</script>

</body>
</html>
