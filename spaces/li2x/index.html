<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>li2x</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

/* 🎥 خلفية */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.3);
}

/* ✨ كرت */
.card{
  text-align:center;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  padding:30px;
  border-radius:20px;
  width:300px;
  animation:fade 1.2s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* 🧑 صورة */
.avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  margin-bottom:15px;
  border:3px solid #38bdf8;
  animation:float 3s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* 🧠 اسم */
h1{
  font-size:28px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  -webkit-background-clip:text;
  color:transparent;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 5px #38bdf8;}
  to{text-shadow:0 0 20px #22c55e;}
}

/* 📝 وصف */
p{
  color:#ccc;
  margin:10px 0 20px;
}

/* 🎮 box */
.box{
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:15px;
  margin-bottom:20px;
}

/* 🔗 روابط */
.links a{
  margin:0 10px;
  font-size:24px;
  text-decoration:none;
  transition:0.3s;
}

.links a:hover{
  transform:scale(1.2);
}

/* 👁️ عدد */
.views{
  position:absolute;
  bottom:20px;
  left:20px;
  color:#aaa;
  font-size:14px;
}

</style>
</head>

<body>

<!-- 🎥 فيديو خلفية -->
<video autoplay muted loop>
  <source src="https://cdn.discordapp.com/attachments/1503798785929646325/1505730491624456385/o4TtEB9iRSvfbpPq9gQvIEbfIA0nd0BrFzXDiB.mp4?ex=6a0bb04c&is=6a0a5ecc&hm=93169fc3c9d760773c5724e2d763befe703db324223020b472327d3ac9f565a7&" type="video/mp4">
</video>

<div class="card">

  <img src="https://cdn.discordapp.com/attachments/1503798785929646325/1505729257358495754/d8fae546e6d2314a0bf9a9f532d11e41.png?ex=6a0baf26&is=6a0a5da6&hm=c3c87a4440b77f9d77b66899fde67a592d6096b77232bbedcade6596ab5164bc&" class="avatar">

  <h1>li2x</h1>

  <p>Modern Developer • Clean Code • Creative Mind</p>

  <div class="box">
    🎧 Discord: <b>z65_</b>
  </div>

  <div class="links">
    <a href="#">💬</a>
    <a href="#">👑</a>
    <a href="#">🔥</a>
  </div>

</div>

<div class="views">👁️ 1k</div>

</body>
</html>
