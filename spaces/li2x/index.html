<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>li2x</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:black;
}

video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.35);
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  cursor:pointer;
}

.overlay h1{
  font-size:28px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:0.5;}
}

.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid white;
  margin-bottom:15px;
}

.name{
  font-size:34px;
  font-weight:bold;
  text-shadow:0 0 8px rgba(255,255,255,0.6);
}

.lyrics{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  font-size:18px;
  color:#fff;
  text-shadow:0 0 10px rgba(0,0,0,0.7);
  transition:0.5s;
}

.views{
  position:absolute;
  bottom:20px;
  left:20px;
  color:#ccc;
}

</style>
</head>

<body>

<div class="overlay" onclick="startSite()">
  <h1>Click to Enter</h1>
</div>

<video id="bgVideo" loop>
  <source src="https://files.catbox.moe/jm9c1p.mp4" type="video/mp4">
</video>

<audio id="bgMusic">
  <source src="https://files.catbox.moe/r9ig2d.mp3" type="audio/mpeg">
</audio>

<div style="text-align:center;">
  <img src="https://cdn.discordapp.com/attachments/1209826157974003734/1504919082250665994/IMG_6746.jpg?ex=6a0cb11d&is=6a0b5f9d&hm=0aec94227b761317b302ddc0802760ded4f69552e43a01fe26a8cf52ae613951&" class="avatar">
  <div class="name">li2x</div>
</div>

<div class="lyrics" id="lyrics"></div>

<div class="views">👁️ 500</div>

<script>
const lyrics = [
  { time: 2, text: "I feel lost in the dark..." },
  { time: 6, text: "Trying to find my way..." },
  { time: 10, text: "Memories fade away..." },
  { time: 14, text: "But I still hear your name..." }
];

function startSite(){
  document.querySelector(".overlay").style.display="none";

  const video = document.getElementById("bgVideo");
  const music = document.getElementById("bgMusic");

  video.play();
  music.play();

  syncLyrics();
}

function syncLyrics(){
  const music = document.getElementById("bgMusic");
  const text = document.getElementById("lyrics");

  setInterval(()=>{
    let currentTime = music.currentTime;

    lyrics.forEach(line=>{
      if(currentTime >= line.time){
        text.innerText = line.text;
      }
    });

  },500);
}
</script>

</body>
</html>
