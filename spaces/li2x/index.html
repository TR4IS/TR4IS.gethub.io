<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>li2x</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:black;
}

/* 🎥 فيديو */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.35);
}

/* 🎬 دخول */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  cursor:pointer;
}

.overlay h1{
  font-size:28px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{opacity:0.5;}
}

/* 🧊 كرت */
.card{
  text-align:center;
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

/* 🧑 صورة */
.avatar{
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px solid white;
  margin-bottom:15px;
}

/* ✨ اسم */
.name{
  font-size:30px;
  font-weight:bold;
}

/* 🧠 وصف */
.bio{
  margin:10px 0;
  color:#ccc;
}

/* 🎮 بوكس */
.discord{
  margin-top:15px;
  padding:10px;
  border-radius:15px;
  background:rgba(0,0,0,0.5);
}

/* 🔥 أيقونات */
.icons{
  margin-top:15px;
}

.icons span{
  font-size:22px;
  margin:0 6px;
  filter:grayscale(1);
  transition:0.3s;
}

.icons span:hover{
  filter:grayscale(0);
  transform:scale(1.2);
}

</style>
</head>

<body>

<!-- 🎬 شاشة دخول -->
<div class="overlay" onclick="startSite()">
  <h1>Click to Enter</h1>
</div>

<!-- 🎥 الفيديو -->
<video id="bgVideo" loop>
  <source src="https://reachflow.site/687f862d-49bd-48dc-9cc0-e7713908a0a6.mp4" type="video/mp4">
</video>

<div class="card">

  <!-- 🧑 غير الصورة هنا -->
  <img src="https://media.discordapp.net/attachments/1209826157974003734/1504919082250665994/IMG_6746.jpg?ex=6a0cb11d&is=6a0b5f9d&hm=0aec94227b761317b302ddc0802760ded4f69552e43a01fe26a8cf52ae613951&=&format=webp&width=856&height=856" class="avatar">

  <div class="name">li2x</div>

  <div class="icons">
    
  </div>

  <div class="bio">
    あの世で会えるといいな
  </div>

  <div class="discord">
    🎧 Discord: <b>z65_</b>
  </div>

</div>

<script>
function startSite(){
  document.querySelector(".overlay").style.display="none";
  const video = document.getElementById("bgVideo");
  video.muted = false;
  video.play();
}
</script>

</body>
</html>
