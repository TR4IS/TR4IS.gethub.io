  <script id="user-html" type="text/x-user-html"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TR4IS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #060606;
      color: #efefef;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 60px 24px 100px;
    }

    /* ── Profile ── */
    .avatar {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 3px solid #8b5cf6;
      box-shadow: 0 0 50px rgba(139,92,246,.45);
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 12vw, 5.5rem);
      letter-spacing: 6px; line-height: 1;
      text-shadow: 0 0 60px rgba(139,92,246,.8);
    }
    .tagline {
      font-size: .6rem; color: rgba(239,239,239,.4);
      letter-spacing: 3px; text-transform: uppercase;
    }

    /* ── Section ── */
    .section {
      width: min(500px, 92vw);
      display: flex; flex-direction: column; gap: 10px;
    }
    .section-lbl {
      font-size: .46rem; color: #8b5cf6;
      letter-spacing: 3px; text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(139,92,246,.18);
      margin-bottom: 2px;
    }

    /* ── Download cards ── */
    .dl-card {
      display: flex; align-items: center; gap: 16px;
      border: 1px solid rgba(139,92,246,.14);
      background: rgba(139,92,246,.03);
      padding: 14px 18px; text-decoration: none; color: inherit;
      transition: border-color .2s, background .2s, transform .15s;
      position: relative;
    }
    .dl-card:hover {
      border-color: rgba(139,92,246,.45);
      background: rgba(139,92,246,.08);
      transform: translateX(3px);
    }
    .dl-card:active { transform: translateX(3px) scale(.99); }

    .dl-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1; }
    .dl-info { flex: 1; min-width: 0; }
    .dl-name {
      font-size: .72rem; font-weight: 700; letter-spacing: 1px;
      color: #efefef; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dl-desc {
      font-size: .52rem; color: rgba(239,239,239,.38);
      letter-spacing: .5px; line-height: 1.6;
    }
    .dl-badge {
      flex-shrink: 0;
      font-size: .42rem; letter-spacing: 2px; text-transform: uppercase;
      color: #8b5cf6; background: rgba(139,92,246,.12);
      border: 1px solid rgba(139,92,246,.28);
      padding: 3px 8px;
    }
    /* Arrow indicator */
    .dl-card::after {
      content: '\2193';
      position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
      font-size: .7rem; color: rgba(139,92,246,.5);
      transition: color .2s;
    }
    .dl-card:hover::after { color: #8b5cf6; }
    /* When badge is present, push arrow further left handled by flex */

    /* ── Links ── */
    .gh-btn {
      font-size: .58rem; letter-spacing: 3px; text-transform: uppercase;
      font-weight: 700; color: #060606; background: #8b5cf6;
      border: 1.5px solid #8b5cf6; padding: 11px 28px;
      text-decoration: none; transition: background .25s, color .25s;
    }
    .gh-btn:hover { background: transparent; color: #8b5cf6; }
  </style>
</head>
<body>

  <img class="avatar" src="https://github.com/TR4IS.png" alt="TR4IS">

  <p class="tagline">Developer &middot; reachflow creator</p>

  <div class="section">

    <a class="dl-card" href="LINK_HERE" download>

      <div class="dl-info">
        <div class="dl-name">Program Name</div>

      </div>
      <span class="dl-badge">EXE</span>
    </a>

    <a class="dl-card" href="LINK_HERE" download>
      <span class="dl-icon">&#128229;</span>
      <div class="dl-info">
        <div class="dl-name">Program Name 2</div>
        <div class="dl-desc">Another tool, script, or release</div>
      </div>
      <span class="dl-badge">ZIP</span>
    </a>

    <a class="dl-card" href="LINK_HERE" download>
      <span class="dl-icon">&#128229;</span>
      <div class="dl-info">
        <div class="dl-name">Program Name 3</div>
        <div class="dl-desc">Add more cards as needed via the editor</div>
      </div>
      <span class="dl-badge">RAR</span>

  </div>

  <a class="gh-btn" href="https://github.com/TR4IS" target="_blank" rel="noopener">GitHub &#8599;</a>

</body>
</html></script>
  <script>
  (function(){
    var login="TR4IS";
    document.getElementById('space-frame').srcdoc=document.getElementById('user-html').textContent;
    var u=localStorage.getItem('rf_user');
    var t=localStorage.getItem('rf_token');
    var btn=document.getElementById('edit-btn');
    if(u&&u.toLowerCase()===login.toLowerCase()&&t){
      btn.style.display='inline-flex';
      btn.addEventListener('click',function(e){
        e.preventDefault();
        localStorage.setItem('rf_editData',JSON.stringify({login:login}));
        window.location.href='/editor.html?user='+encodeURIComponent(login);
      });
    }
  })();
  </script>
</body>
</html>
