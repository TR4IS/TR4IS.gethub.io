<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TR4IS — reachflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#060606}
    #space-frame{position:fixed;inset:0;width:100%;height:100%;border:none;display:block}
    nav{position:fixed;top:0;left:0;right:0;z-index:9998;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(6,6,6,.96);border-bottom:1px solid rgba(139,92,246,.15);backdrop-filter:blur(14px)}
    .nav-brand{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:5px;color:#efefef;text-decoration:none}
    .nav-brand span{color:#8b5cf6}
    .nav-right{display:flex;align-items:center;gap:16px}
    .nav-back{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(239,239,239,.28);text-decoration:none;transition:color .2s}
    .nav-back:hover{color:#efefef}
    #edit-btn{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:#060606;background:#8b5cf6;padding:8px 16px;border:1.5px solid #8b5cf6;text-decoration:none;display:none;align-items:center;gap:6px;transition:background .25s,color .25s}
    #edit-btn:hover{background:transparent;color:#8b5cf6}
    footer{position:fixed;bottom:0;left:0;right:0;z-index:9997;padding:5px 28px;display:flex;justify-content:space-between;font-size:.5rem;color:rgba(239,239,239,.1);letter-spacing:2px;pointer-events:none;font-family:'JetBrains Mono',monospace;background:rgba(6,6,6,.7);backdrop-filter:blur(8px)}
    footer a{pointer-events:auto;color:rgba(239,239,239,.1);text-decoration:none;transition:color .2s}
    footer a:hover{color:rgba(239,239,239,.3)}
    @media(max-width:600px){nav{padding:0 16px}#edit-btn{font-size:.56rem;padding:7px 13px}}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">REACH<span>_</span>FLOW</a>
    <div class="nav-right">
      <a href="/spaces" class="nav-back">&#8592; spaces</a>
      <a href="#" id="edit-btn">&#x270F;&nbsp;Edit</a>
    </div>
  </nav>
  <iframe id="space-frame"
    sandbox="allow-scripts allow-forms allow-popups allow-pointer-lock allow-modals"
    title="TR4IS's space"
    loading="eager"
  ></iframe>
  <footer>
    <span>&#169; 2026 reachflow.site &middot; TR4IS</span>
    <a href="/terms">terms</a>
  </footer>
  <script id="user-html" type="text/x-user-html"><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TR4IS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #060606;
      --fg:     #efefef;
      --a:      #8b5cf6;
      --a2:     rgba(139,92,246,.3);
      --a3:     rgba(139,92,246,.12);
      --dim:    rgba(239,239,239,.35);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      background-image:
        linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px);
      background-size: 72px 72px;
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 72px 20px 36px;
      position: relative;
    }

    /* Page-wide ethereal scan */
    body::before {
      content: '';
      position: fixed;
      top: -60%; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(139,92,246,.013) 50%,
        transparent 100%);
      animation: pagescan 12s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes pagescan { from { top: -60%; } to { top: 110%; } }

    /* ── Corner marks ── */
    .cm { position: fixed; width: 22px; height: 22px; z-index: 2; }
    .cm::before, .cm::after { content: ''; position: absolute; background: var(--a2); }
    .cm::before { width: 100%; height: 1px; top: 0; left: 0; }
    .cm::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .cm.tl { top: 16px; left: 16px; }
    .cm.tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .cm.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .cm.br { bottom: 16px; right: 16px; transform: scale(-1); }

    /* ── Content stack ── */
    .stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
      z-index: 10;
    }

    .top-lbl {
      font-size: .58rem;
      letter-spacing: 5px;
      color: rgba(139,92,246,.45);
      text-transform: uppercase;
      margin-bottom: 26px;
      opacity: 0;
      animation: fu .5s ease forwards .05s;
    }

    /* ── Targeting reticle ── */
    .reticle {
      position: relative;
      width: 158px; height: 158px;
      margin-bottom: 30px;
      opacity: 0;
      animation: fu .55s ease forwards .2s;
      flex-shrink: 0;
    }

    /* Outer static ring */
    .r-static {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px solid rgba(139,92,246,.1);
    }

    /* Spinning arc */
    .r-spin {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: var(--a);
      border-right-color: var(--a2);
      animation: spin 8s linear infinite;
    }

    /* Counter-spin inner arc */
    .r-cspin {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid transparent;
      border-bottom-color: rgba(139,92,246,.25);
      border-left-color: rgba(139,92,246,.12);
      animation: spin 13s linear infinite reverse;
    }

    /* Tick dot that travels with the spin */
    .r-tick {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      animation: spin 8s linear infinite;
    }
    .r-tick::before {
      content: '';
      position: absolute;
      width: 5px; height: 1.5px;
      background: var(--a);
      top: 50%; left: 0;
      transform: translateY(-50%);
    }
    .r-tick::after {
      content: '';
      position: absolute;
      width: 1.5px; height: 5px;
      background: var(--a);
      top: 0; left: 50%;
      transform: translateX(-50%);
    }

    /* Crosshair arms */
    .r-ch {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .r-ch::before, .r-ch::after {
      content: '';
      position: absolute;
      height: 1px;
      width: 16px;
      background: linear-gradient(to right, transparent, rgba(139,92,246,.28));
    }
    .r-ch::before { left: -24px; }
    .r-ch::after  { right: -24px; transform: scaleX(-1); }

    .r-cv {
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      width: 1px;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .r-cv::before, .r-cv::after {
      content: '';
      position: absolute;
      width: 1px;
      height: 16px;
      background: linear-gradient(to bottom, transparent, rgba(139,92,246,.28));
    }
    .r-cv::before { top: -24px; }
    .r-cv::after  { bottom: -24px; transform: scaleY(-1); }

    /* Avatar */
    .avatar {
      width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
      border: 1.5px solid rgba(139,92,246,.4);
      box-shadow: 0 0 0 1px rgba(139,92,246,.06), 0 0 32px rgba(139,92,246,.2);
      display: block;
      position: relative; z-index: 2;
    }

    /* Scan line sweeping over avatar */
    .r-scan {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right,
        transparent, rgba(139,92,246,.45) 30%,
        rgba(139,92,246,.65) 50%,
        rgba(139,92,246,.45) 70%, transparent);
      border-radius: 50%;
      z-index: 3;
      pointer-events: none;
      animation: avscan 4s ease-in-out infinite;
    }
    @keyframes avscan { 0% { top: 4%; opacity:.85; } 100% { top: 96%; opacity:0; } }

    /* Corner brackets on avatar */
    .bkt { position: absolute; width: 13px; height: 13px; z-index: 4; }
    .bkt::before, .bkt::after { content: ''; position: absolute; background: var(--a); }
    .bkt::before { width: 100%; height: 1.5px; top: 0; left: 0; }
    .bkt::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
    .bkt.tl { top: -6px; left: -6px; }
    .bkt.tr { top: -6px; right: -6px; transform: scaleX(-1); }
    .bkt.bl { bottom: -6px; left: -6px; transform: scaleY(-1); }
    .bkt.br { bottom: -6px; right: -6px; transform: scale(-1); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Name ── */
    .code-lbl {
      display: block;
      font-size: .58rem;
      letter-spacing: 6px;
      color: rgba(139,92,246,.4);
      text-transform: uppercase;
      margin-bottom: 2px;
      opacity: 0;
      animation: fu .4s ease forwards .38s;
    }

    .name {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4.8rem, 17vw, 8rem);
      letter-spacing: 10px;
      line-height: 1;
      color: var(--fg);
      text-shadow: 0 0 55px rgba(139,92,246,.28);
      position: relative;
      opacity: 0;
      animation: fu .5s ease forwards .48s;
    }

    /* Glitch layers — fire every 8s */
    .name::before, .name::after {
      content: 'TR4IS';
      position: absolute; inset: 0;
      opacity: 0;
    }
    .name::before {
      color: rgba(139,92,246,.9);
      clip-path: polygon(0 18%, 100% 18%, 100% 36%, 0 36%);
      animation: g1 8s infinite 1.5s;
    }
    .name::after {
      color: rgba(0,210,255,.4);
      clip-path: polygon(0 60%, 100% 60%, 100% 77%, 0 77%);
      animation: g2 8s infinite 1.5s;
    }
    @keyframes g1 {
      0%,88%,100%  { opacity:0; transform:none; }
      89% { opacity:1; transform:translateX(-4px); }
      90% { opacity:0; }
      91% { opacity:1; transform:translateX(3px); }
      92% { opacity:0; }
    }
    @keyframes g2 {
      0%,88%,100%  { opacity:0; transform:none; }
      89% { opacity:1; transform:translateX(4px); }
      90% { opacity:0; }
      91% { opacity:1; transform:translateX(-3px); }
      92% { opacity:0; }
    }

    /* ── Data table ── */
    .data {
      margin-top: 22px;
      width: clamp(230px, 46vw, 310px);
      border-top: 1px solid rgba(139,92,246,.1);
      opacity: 0;
      animation: fu .4s ease forwards .65s;
    }
    .dr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(139,92,246,.06);
      font-size: .63rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .dk { color: rgba(139,92,246,.4); }
    .dv { color: rgba(239,239,239,.6); }
    .dv.on {
      color: #10b981;
      display: flex; align-items: center; gap: 6px;
    }
    .dv.on::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 7px #10b981;
      animation: blink 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.28} }

    /* ── GitHub button ── */
    .gh {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 26px;
      padding: 12px 30px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: .75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--bg);
      background: var(--a);
      border: 1.5px solid var(--a);
      transition: background .25s, color .25s;
      opacity: 0;
      animation: fu .4s ease forwards .84s;
      overflow: hidden;
      position: relative;
    }
    .gh::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.11), transparent);
      transition: left .45s;
    }
    .gh:hover { background: transparent; color: var(--a); }
    .gh:hover::after { left: 100%; }

    /* ── Status badge ── */
    .sys {
      position: fixed;
      bottom: 18px; right: 18px;
      font-size: .54rem;
      letter-spacing: 2.5px;
      color: rgba(139,92,246,.22);
      text-transform: uppercase;
      opacity: 0;
      animation: fu .3s ease forwards 1.1s;
    }

    @keyframes fu {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body { padding-top: 64px; }
      .reticle { width: 128px; height: 128px; }
      .name { font-size: clamp(3.8rem, 20vw, 5rem); }
      .cm { display: none; }
    }
  </style>
</head>
<body>

  <div class="cm tl"></div>
  <div class="cm tr"></div>
  <div class="cm bl"></div>
  <div class="cm br"></div>

  <div class="stage">
    <span class="top-lbl">// operator profile</span>

    <div class="reticle">
      <div class="r-static"></div>
      <div class="r-spin"></div>
      <div class="r-cspin"></div>
      <div class="r-tick"></div>
      <div class="r-ch"></div>
      <div class="r-cv"></div>
      <img class="avatar" src="https://github.com/TR4IS.png" alt="TR4IS">
      <div class="r-scan"></div>
      <div class="bkt tl"></div>
      <div class="bkt tr"></div>
      <div class="bkt bl"></div>
      <div class="bkt br"></div>
    </div>

    <span class="code-lbl">// codename</span>
    <span class="name">TR4IS</span>

    <div class="data">
      <div class="dr">
        <span class="dk">Status</span>
        <span class="dv on">Online</span>
      </div>
      <div class="dr">
        <span class="dk">Platform</span>
        <span class="dv">Reachflow</span>
      </div>
      <div class="dr">
        <span class="dk">Clearance</span>
        <span class="dv">Developer</span>
      </div>
    </div>

    <a class="gh" href="https://github.com/TR4IS" target="_blank" rel="noopener">
      GitHub &#8599;
    </a>
  </div>

  <p class="sys">SYS::NOMINAL</p>

</body>
</html></script>
  <script>
  (function(){
    var login="TR4IS";
    document.getElementById('space-frame').srcdoc=document.getElementById('user-html').textContent;
    var u=localStorage.getItem('rf_user');
    var t=localStorage.getItem('rf_token');
    var btn=document.getElementById('edit-btn');
    if(u&&u.toLowerCase()===login.toLowerCase()&&t){
      btn.style.display='inline-flex';
      btn.addEventListener('click',function(e){
        e.preventDefault();
        localStorage.setItem('rf_editData',JSON.stringify({login:login}));
        window.location.href='/editor.html?user='+encodeURIComponent(login);
      });
    }
  })();
  </script>
</body>
</html>
