<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n3trunner — nodes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%23060606'/><rect width='32' height='32' rx='5' fill='%238b5cf6' opacity='.15'/><text x='4' y='23' font-family='monospace' font-size='14' font-weight='900' fill='%238b5cf6'>n3t</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* ── THEME.md variables ── */
    :root {
      --bg:      #060606;
      --fg:      #efefef;
      --accent:  #8b5cf6;
      --accent2: #06b6d4;
      --border:  rgba(139,92,246,.14);
      --dim:     rgba(239,239,239,.35);
      --mono:    'JetBrains Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    /* ── Grid background (THEME.md §4) ── */
    body {
      background: #060606;
      background-image:
        linear-gradient(rgba(255,255,255,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.016) 1px, transparent 1px);
      background-size: 72px 72px;
      color: var(--fg);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Nav (THEME.md §5) ── */
    nav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px;
      background: rgba(6,6,6,.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-brand {
      font-family: var(--display);
      font-size: 1.1rem; letter-spacing: 5px; color: var(--fg);
    }
    .nav-brand span { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-link {
      font-size: .82rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--dim); transition: color .2s;
    }
    .nav-link:hover { color: var(--fg); }

    /* ── Main ── */
    main { max-width: 920px; margin: 0 auto; padding: 72px 40px 100px; flex: 1; }

    /* ── Section label (THEME.md §6) ── */
    .section-lbl {
      font-size: .80rem; color: var(--accent);
      letter-spacing: 3px; text-transform: uppercase;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      margin-bottom: 32px;
    }

    /* ── Page heading ── */
    .page-h1 {
      font-family: var(--display);
      font-size: clamp(3.5rem, 8vw, 6rem);
      letter-spacing: 4px; line-height: 1;
      margin-bottom: 16px;
    }
    .page-sub {
      font-size: .88rem; color: var(--dim);
      letter-spacing: .5px; line-height: 1.8;
      margin-bottom: 52px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    #space-count {
      color: var(--accent);
    }

    /* ── Search ── */
    .search-wrap {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 0; margin-bottom: 0;
      border-bottom: 1px solid var(--border);
      transition: border-color .25s;
    }
    .search-wrap:focus-within { border-bottom-color: var(--accent); }
    .search-prefix {
      font-size: .72rem; color: var(--accent);
      letter-spacing: 2px; white-space: nowrap; flex-shrink: 0;
    }
    .search-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--mono); font-size: .88rem;
      color: var(--fg); caret-color: var(--accent);
      letter-spacing: .5px;
    }
    .search-input::placeholder { color: rgba(239,239,239,.2); }
    .search-count {
      font-size: .68rem; color: rgba(239,239,239,.2);
      letter-spacing: 2px; white-space: nowrap; flex-shrink: 0;
    }

    /* ── Space rows ── */
    #spaces-list a {
      display: flex; align-items: center; gap: 20px;
      border-top: 1px solid var(--border);
      padding: 18px 0 18px 12px;
      position: relative;
      transition: padding-left .25s, border-color .2s;
    }
    #spaces-list a:last-child { border-bottom: 1px solid var(--border); }
    #spaces-list a::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--accent);
      transform: scaleY(0); transform-origin: top;
      transition: transform .3s;
    }
    #spaces-list a:hover { padding-left: 20px; border-color: rgba(139,92,246,.3); }
    #spaces-list a:hover::before { transform: scaleY(1); }

    .space-num {
      font-size: .65rem; font-weight: 700;
      color: rgba(139,92,246,.18); min-width: 32px;
      transition: color .2s;
    }
    #spaces-list a:hover .space-num { color: rgba(139,92,246,.5); }

    .space-name {
      font-size: .92rem; font-weight: 700; color: var(--fg);
      transition: color .2s;
    }
    #spaces-list a:hover .space-name { color: var(--accent); }

    .space-arrow {
      margin-left: auto; font-size: .85rem; color: var(--dim);
      transition: transform .25s, color .2s;
    }
    #spaces-list a:hover .space-arrow { transform: translate(3px,-3px); color: var(--accent); }

    /* ── States ── */
    .spaces-msg {
      font-size: .76rem; color: var(--dim);
      letter-spacing: 2px; padding: 28px 0;
    }
    .spaces-msg.loading { animation: blink 1.2s step-end infinite; }
    .spaces-msg.error   { color: #ef4444; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Footer (THEME.md §11) ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 14px 40px;
      display: flex; justify-content: space-between;
      font-size: .76rem; color: rgba(239,239,239,.12);
      letter-spacing: 2px; font-family: var(--mono);
    }
    footer a { color: rgba(239,239,239,.12); transition: color .2s; }
    footer a:hover { color: rgba(239,239,239,.4); }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      nav  { padding: 14px 20px; }
      .nav-links { display: none; }
      main { padding: 48px 20px 80px; }
      footer { padding: 14px 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">N3T<span>_</span>RUNNER</a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/downloads" class="nav-link">Downloads</a>
  </div>
</nav>

<main>
  <p class="section-lbl">// all spaces</p>
  <h1 class="page-h1">DEVELOPER<br>NODES</h1>
  <p class="page-sub">Every runner on n3trunner — <span id="space-count">...</span> nodes and counting.</p>

  <div class="search-wrap">
    <span class="search-prefix">// search:</span>
    <input type="text" id="search-input" class="search-input"
           placeholder="type a username…" autocomplete="off" spellcheck="false">
    <span class="search-count" id="search-count"></span>
  </div>

  <div id="spaces-list"></div>
</main>

<footer>
  <span>&#169; 2026 n3trunner.dev &middot; TR4IS</span>
  <a href="/terms">terms</a>
</footer>

<script>
(function () {
  var listEl      = document.getElementById('spaces-list');
  var searchInput = document.getElementById('search-input');
  var searchCount = document.getElementById('search-count');
  var countEl     = document.getElementById('space-count');
  var allDirs     = [];

  function renderRows(dirs) {
    if (!dirs.length) {
      listEl.innerHTML = '<p class="spaces-msg">// no match found</p>';
      return;
    }
    listEl.innerHTML = dirs.map(function (item, i) {
      var num = String(i + 1).padStart(2, '0');
      return '<a href="' + encodeURIComponent(item.name) + '/">' +
        '<span class="space-num">' + num + '</span>' +
        '<span class="space-name">' + item.name + '</span>' +
        '<span class="space-arrow">&#8599;</span>' +
        '</a>';
    }).join('');
  }

  listEl.innerHTML = '<p class="spaces-msg loading">// loading spaces...</p>';

  fetch('https://api.github.com/repos/TR4IS/TR4IS.gethub.io/contents/spaces')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      allDirs = data.filter(function (item) { return item.type === 'dir'; });
      countEl.textContent = allDirs.length;
      renderRows(allDirs);

      searchInput.addEventListener('input', function () {
        var q = searchInput.value.trim().toLowerCase();
        var filtered = q
          ? allDirs.filter(function (d) { return d.name.toLowerCase().includes(q); })
          : allDirs;
        renderRows(filtered);
        searchCount.textContent = q ? filtered.length + ' / ' + allDirs.length : '';
      });
    })
    .catch(function () {
      listEl.innerHTML = '<p class="spaces-msg error">// could not load spaces — check your connection</p>';
    });
})();
</script>

</body>
</html>
