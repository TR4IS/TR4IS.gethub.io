    function fracToPos(el, xF, yF) {
      if (xF == null || yF == null) return;

      el.style.top  = (window.innerHeight * yF - el.offsetHeight / 2) + 'px';

        };
        const sb = document.createElement('div');
        sb.className = 'spc-el';
        sb.id = 'social-bar';
        sb.innerHTML = '<div class="social-bar">' + socials.map(s => {
          const ic = ICONS[s.platform] || ICONS.custom;
          try { const u = new URL(s.url); if (u.protocol!=='http:'&&u.protocol!=='https:') return ''; } catch { return ''; }
          return '<a href="'+s.url+'" target="_blank" rel="noopener" class="spc-social-link" style="background:'+ic.bg+'"><svg viewBox="0 0 24 24" width="18" height="18">'+ic.svg+'</svg></a>';
        }).join('') + '</div>';
        document.getElementById('stage').appendChild(sb);
        requestAnimationFrame(() => {
          if (D.socialPos) {
            sb.style.left  = (window.innerWidth  * D.socialPos.xFrac - sb.offsetWidth/2)  + 'px';
            sb.style.top   = (window.innerHeight * D.socialPos.yFrac - sb.offsetHeight/2) + 'px';
          } else {
            sb.style.left  = (window.innerWidth/2 - sb.offsetWidth/2)   + 'px';
            sb.style.top   = (window.innerHeight * 0.85 - sb.offsetHeight/2) + 'px';
          }
        });
      }

      document.getElementById('stage').style.opacity = '1';
    }));

    /* edit button — owner only */
    const editBtn = document.getElementById('edit-btn');
    const storedUser  = localStorage.getItem('rf_user');
    const storedToken = localStorage.getItem('rf_token');
    if (storedUser && storedUser.toLowerCase() === D.login.toLowerCase() && storedToken) {
      editBtn.style.display = 'inline-flex';
      editBtn.addEventListener('click', e => {
        e.preventDefault();
        localStorage.setItem('rf_editData', JSON.stringify(D));
        window.location.href = '/editor.html?user=' + encodeURIComponent(D.login);
      });
    }

    /* audio */
    const audioEl = document.getElementById('bg-audio');
    if (audioEl) {
      const playBtn = document.getElementById('audio-play');
      const volSlider = document.getElementById('audio-vol');
      const muteBtn = document.getElementById('audio-mute');
      audioEl.volume = 0.5;
      let muted = false;
      playBtn.addEventListener('click', () => {
        if (audioEl.paused) { audioEl.play().catch(()=>{}); playBtn.innerHTML='&#9646;&#9646;'; }
        else { audioEl.pause(); playBtn.innerHTML='&#9654;'; }
      });
      volSlider.addEventListener('input', () => {
        audioEl.volume = volSlider.value;
        if (muted && +volSlider.value > 0) { muted=false; audioEl.muted=false; muteBtn.innerHTML='&#128266;'; }
      });
      muteBtn.addEventListener('click', () => {
        muted = !muted; audioEl.muted = muted;
        muteBtn.innerHTML = muted ? '&#128263;' : '&#128266;';
      });
    }
  })();
  </script>
