<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reachflow — signing in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606; --fg: #efefef; --accent: #00ff88;
      --dim: rgba(239,239,239,.28);
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 72px 72px;
      color: var(--fg);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .box {
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 24px;
    }
    .status-label {
      font-size: .52rem; color: var(--accent);
      letter-spacing: 3px; text-transform: uppercase;
    }
    .status-text {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--fg); letter-spacing: 2px; line-height: 1;
    }
    .status-text.error { color: #ff5555; }
    .status-text.success { color: var(--accent); }
    .sub {
      font-size: .65rem; color: var(--dim);
      letter-spacing: 1px; line-height: 1.7;
    }
    .blink { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .back-link {
      font-size: .6rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--dim); text-decoration: none;
      border-bottom: 1px solid rgba(239,239,239,.1);
      padding-bottom: 2px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--fg); }
  </style>
</head>
<body>
  <div class="box" id="box">
    <p class="status-label">// reachflow auth</p>
    <p class="status-text" id="headline">Authenticating<span class="blink">_</span></p>
    <p class="sub" id="sub">Talking to GitHub, hang tight.</p>
  </div>

  <script>
    /* ── Config — update WORKER_URL after you deploy the worker ── */
    const WORKER_URL = 'https://reachflow-auth.cr4cker.workers.dev';

    const headline = document.getElementById('headline');
    const sub = document.getElementById('sub');

    function setError(msg) {
      headline.textContent = 'Error';
      headline.className = 'status-text error';
      sub.textContent = msg;
      const br1 = document.createElement('br');
      const br2 = document.createElement('br');
      const link = document.createElement('a');
      link.href = '/';
      link.className = 'back-link';
      link.textContent = '← back to reachflow';
      sub.append(br1, br2, link);
    }

    function setSuccess(username, created) {
      if (!created) {
        headline.textContent = 'Welcome Back';
        headline.className = 'status-text success';
        sub.textContent = `Welcome back, ${username} — redirecting…`;
        setTimeout(() => { window.location.href = `/spaces/${username}/`; }, 1800);
        return;
      }

      // New space — GitHub Pages needs ~60s to rebuild
      headline.textContent = 'Building Space';
      headline.className = 'status-text success';

      const editUrl = `https://github.com/TR4IS/TR4IS.gethub.io/edit/main/spaces/${username}/index.html`;
      const spaceUrl = `/spaces/${username}/`;

      let seconds = 60;
      function tick() {
        if (seconds > 0) {
          sub.innerHTML = `Setting up <span style="color:var(--accent)">/spaces/${username}/</span><br>
            GitHub is building your page — <span style="color:var(--accent)">${seconds}s</span> left…`;
          seconds--;
          setTimeout(tick, 1000);
        } else {
          headline.textContent = 'Space Ready';
          sub.innerHTML = `
            Your space is live at <span style="color:var(--accent)">/spaces/${username}/</span><br><br>
            <div id="terms-gate" style="margin:20px auto 0;max-width:480px;padding:20px 24px;border:1px solid rgba(239,239,239,.1);text-align:left;background:rgba(0,255,136,.03)">
              <p style="font-size:.52rem;color:var(--accent);letter-spacing:2px;margin-bottom:12px">// before you edit</p>
              <p style="font-size:.62rem;color:rgba(239,239,239,.5);line-height:1.75;margin-bottom:16px">
                Your space is <strong style="color:#efefef">publicly accessible</strong> on the internet.
                No illegal content, hate speech, spam, or harmful material.
                Violations result in immediate removal.
              </p>
              <label style="display:flex;align-items:flex-start;gap:10px;cursor:none;font-size:.58rem;color:rgba(239,239,239,.45);line-height:1.6">
                <input type="checkbox" id="terms-check" style="margin-top:2px;accent-color:#00ff88;cursor:none;flex-shrink:0">
                I have read and agree to the
                <a href="/terms.html" target="_blank" rel="noopener" style="color:#00ff88;text-decoration:underline;text-underline-offset:3px">reachflow Terms of Use</a>
              </label>
            </div>
            <div id="action-btns" style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:20px;opacity:.25;pointer-events:none;transition:opacity .4s">
              <a href="${spaceUrl}" style="display:inline-flex;align-items:center;gap:8px;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:#060606;background:#00ff88;padding:12px 24px;border:1.5px solid #00ff88;text-decoration:none">
                View Space ↗
              </a>
              <a href="${editUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:#00ff88;background:transparent;padding:12px 24px;border:1.5px solid #00ff88;text-decoration:none">
                Edit on GitHub &#x270F;
              </a>
            </div>`;
          document.getElementById('terms-check').addEventListener('change', function() {
            const btns = document.getElementById('action-btns');
            btns.style.opacity = this.checked ? '1' : '.25';
            btns.style.pointerEvents = this.checked ? 'auto' : 'none';
          });
        }
      }
      tick();
    }

    async function run() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const returnedState = params.get('state');
      const savedState = sessionStorage.getItem('oauth_state');
      sessionStorage.removeItem('oauth_state');

      if (!code) { setError('No auth code found. Did you come here by accident?'); return; }
      if (!returnedState || returnedState !== savedState) { setError('Security check failed. Please try signing in again.'); return; }

      try {
        const res = await fetch(`${WORKER_URL}/exchange?code=${encodeURIComponent(code)}`);
        const data = await res.json();
        if (data.error) { setError(data.error); return; }
        setSuccess(data.username, data.created);
      } catch (err) {
        setError('Could not reach the auth server. Try again.');
      }
    }

    run();
  </script>
</body>
</html>
