<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reachflow — signing in</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%23060606'/><rect width='32' height='32' rx='5' fill='%238b5cf6' opacity='.15'/><text x='7' y='23' font-family='monospace' font-size='20' font-weight='900' fill='%238b5cf6'>r</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606; --fg: #efefef; --accent: #8b5cf6;
      --dim: rgba(239,239,239,.28); --border: rgba(139,92,246,.18);
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 72px 72px;
      color: var(--fg);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .box {
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      max-width: 520px; width: 100%;
    }
    .status-label { font-size: .52rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }
    .status-text {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--fg); letter-spacing: 2px; line-height: 1;
    }
    .status-text.error   { color: #ff5555; }
    .status-text.success { color: var(--accent); }
    .sub { font-size: .65rem; color: var(--dim); letter-spacing: 1px; line-height: 1.8; }
    .blink { animation: blink 1.1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .back-link {
      font-size: .6rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--dim); text-decoration: none;
      border-bottom: 1px solid rgba(239,239,239,.1); padding-bottom: 2px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--fg); }

    /* Terms gate */
    .terms-gate {
      width: 100%; text-align: left;
      border: 1px solid var(--border);
      background: rgba(139,92,246,.04);
      padding: 20px 22px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .terms-gate-lbl { font-size: .48rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    .terms-gate-body { font-size: .6rem; color: rgba(239,239,239,.45); line-height: 1.75; }
    .terms-gate-body strong { color: var(--fg); }
    .terms-check-row {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: .58rem; color: rgba(239,239,239,.45); line-height: 1.6;
      cursor: pointer;
    }
    .terms-check-row input[type="checkbox"] {
      margin-top: 2px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer;
    }
    .terms-check-row a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

    /* Create button */
    .btn-create {
      font-family: var(--font-mono); font-size: .62rem; letter-spacing: 3px;
      text-transform: uppercase; font-weight: 700;
      color: var(--bg); background: var(--accent);
      border: 1.5px solid var(--accent); padding: 13px 28px;
      cursor: pointer; transition: background .25s, color .25s;
      width: 100%;
    }
    .btn-create:hover:not(:disabled) { background: transparent; color: var(--accent); }
    .btn-create:disabled { opacity: .3; cursor: default; }

    /* View space button */
    .btn-space {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: .65rem; letter-spacing: 3px;
      text-transform: uppercase; font-weight: 700;
      color: var(--bg); background: var(--accent);
      border: 1.5px solid var(--accent); padding: 13px 28px;
      text-decoration: none; transition: background .25s, color .25s;
    }
    .btn-space:hover { background: transparent; color: var(--accent); }
    .create-status { font-size: .52rem; color: #ff5555; letter-spacing: 1px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="box" id="box">
    <p class="status-label"><svg width="14" height="14" viewBox="0 0 32 32" style="display:inline-block;vertical-align:middle;margin-right:6px" aria-hidden="true"><rect width="32" height="32" rx="5" fill="#8b5cf6"/><text x="10" y="22" font-family="monospace" font-size="17" font-weight="900" fill="white">r</text></svg>// reachflow auth</p>
    <p class="status-text" id="headline">Authenticating<span class="blink">_</span></p>
    <p class="sub" id="sub">Talking to GitHub, hang tight.</p>
  </div>

  <script>
    const WORKER_URL = 'https://reachflow-auth.cr4cker.workers.dev';

    const box      = document.getElementById('box');
    const headline = document.getElementById('headline');
    const sub      = document.getElementById('sub');

    /* ── Helpers ── */

    function setError(msg) {
      headline.textContent = 'Error';
      headline.className = 'status-text error';
      sub.textContent = msg;
      const link = document.createElement('a');
      link.href = '/';
      link.className = 'back-link';
      link.textContent = '← back to reachflow';
      box.appendChild(link);
    }

    function setWelcomeBack(username) {
      headline.textContent = 'Welcome Back';
      headline.className = 'status-text success';
      sub.textContent = `Welcome back, ${username} — redirecting…`;
      setTimeout(() => { window.location.href = `/spaces/${username}/`; }, 1800);
    }

    /* Poll until the space URL returns 200, updating the sub text each tick */
    function pollUntilLive(username) {
      return new Promise(resolve => {
        const spaceUrl = `/spaces/${username}/`;
        let secs = 0;
        sub.textContent = 'GitHub is building your page — 0s…';

        const timer = setInterval(async () => {
          secs += 5;
          sub.textContent = `GitHub is building your page — ${secs}s…`;
          try {
            const r = await fetch(spaceUrl, { method: 'HEAD', cache: 'no-store' });
            if (r.ok) { clearInterval(timer); resolve(); }
          } catch { /* network blip, keep polling */ }
        }, 5000);
      });
    }

    async function showSpaceReady(username) {
      headline.textContent = 'Space Ready';
      sub.textContent = '';

      const btn = document.createElement('a');
      btn.className = 'btn-space';
      btn.href = `/spaces/${username}/`;
      btn.textContent = 'View Space ↗';
      box.appendChild(btn);
    }

    /* ── Terms gate — shown before space is created ── */

    function showTermsGate(username, token, profile) {
      headline.textContent = 'Almost There';
      headline.className = 'status-text success';
      sub.textContent = 'Read and agree to the terms to create your space.';

      const gate = document.createElement('div');
      gate.className = 'terms-gate';

      const lbl = document.createElement('p');
      lbl.className = 'terms-gate-lbl';
      lbl.textContent = '// before we create your space';

      const body = document.createElement('p');
      body.className = 'terms-gate-body';
      body.innerHTML = 'Your space will be <strong>publicly accessible</strong> on the internet. '
        + 'No illegal content, hate speech, spam, or harmful material. '
        + 'Violations result in immediate removal.';

      const checkLabel = document.createElement('label');
      checkLabel.className = 'terms-check-row';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.id = 'terms-check';

      const checkText = document.createTextNode(' I have read and agree to the ');
      const termsLink = document.createElement('a');
      termsLink.href = '/terms.html';
      termsLink.target = '_blank';
      termsLink.rel = 'noopener';
      termsLink.textContent = 'reachflow Terms of Use';

      checkLabel.appendChild(checkbox);
      checkLabel.appendChild(checkText);
      checkLabel.appendChild(termsLink);

      gate.appendChild(lbl);
      gate.appendChild(body);
      gate.appendChild(checkLabel);
      box.appendChild(gate);

      const createBtn = document.createElement('button');
      createBtn.className = 'btn-create';
      createBtn.textContent = 'Create my space';
      createBtn.disabled = true;
      box.appendChild(createBtn);

      const statusEl = document.createElement('p');
      statusEl.className = 'create-status';
      box.appendChild(statusEl);

      checkbox.addEventListener('change', () => {
        createBtn.disabled = !checkbox.checked;
      });

      createBtn.addEventListener('click', async () => {
        if (!checkbox.checked) return;
        createBtn.disabled = true;
        statusEl.textContent = '';
        sub.textContent = 'Creating your space…';

        try {
          const res = await fetch(`${WORKER_URL}/create-space`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, profile }),
          });
          const result = await res.json();
          if (!res.ok) throw new Error(result.error || 'Failed to create space');

          // Terms accepted, space created — now remove the gate and poll
          gate.remove();
          createBtn.remove();
          statusEl.remove();

          headline.textContent = 'Building Space';
          await pollUntilLive(username);
          await showSpaceReady(username);
        } catch (err) {
          statusEl.textContent = '// ' + err.message;
          createBtn.disabled = false;
        }
      });
    }

    /* ── Main ── */

    async function run() {
      const params        = new URLSearchParams(window.location.search);
      const code          = params.get('code');
      const returnedState = params.get('state');
      const savedState    = sessionStorage.getItem('oauth_state');

      /* ── Refresh / no code: check existing session ── */
      if (!code) {
        const existingToken = sessionStorage.getItem('rf_token');
        const existingUser  = sessionStorage.getItem('rf_user');
        if (existingToken && existingUser) {
          headline.textContent = 'Checking';
          headline.className = 'status-text';
          sub.textContent = 'Checking your space…';
          try {
            const r = await fetch(`/spaces/${existingUser}/`, { method: 'HEAD', cache: 'no-store' });
            if (r.ok) {
              setWelcomeBack(existingUser);
            } else {
              // Space not live yet — resume polling
              headline.textContent = 'Building Space';
              headline.className = 'status-text success';
              await pollUntilLive(existingUser);
              await showSpaceReady(existingUser);
            }
          } catch {
            setError('Could not check your space status.');
          }
        } else {
          setError('No auth code found. Did you come here by accident?');
        }
        return;
      }

      /* ── CSRF check ── */
      sessionStorage.removeItem('oauth_state');
      if (!returnedState || returnedState !== savedState) {
        setError('Security check failed. Please try signing in again.');
        return;
      }

      /* ── Exchange code ── */
      let data;
      try {
        const res = await fetch(`${WORKER_URL}/exchange?code=${encodeURIComponent(code)}`);
        data = await res.json();
        if (data.error) { setError(data.error); return; }
      } catch {
        setError('Could not reach the auth server. Try again.');
        return;
      }

      if (data.sessionToken) {
        sessionStorage.setItem('rf_token', data.sessionToken);
        sessionStorage.setItem('rf_user',  data.username);
      }

      /* ── Edit flow ── */
      if (savedState && savedState.startsWith('edit:')) {
        headline.textContent = 'Authenticated';
        headline.className   = 'status-text success';
        sub.textContent      = 'Opening editor…';
        setTimeout(() => { window.location.href = `/spaces/${data.username}/`; }, 800);
        return;
      }

      /* ── Existing user ── */
      if (data.exists) {
        setWelcomeBack(data.username);
        return;
      }

      /* ── New user — must agree to terms before space is created ── */
      showTermsGate(data.username, data.sessionToken, data.profile || null);
    }

    run();
  </script>
</body>
</html>
